services:
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-mydatabase}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}'
      - 'POSTGRES_USER=${POSTGRES_USER:-myuser}'
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase}"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:8080}
      APP_MAIL_REQUIRED: ${APP_MAIL_REQUIRED:-false}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mydatabase}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-myuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - '${PORT:-8080}:8080'

volumes:
  pgdata:
