spring.application.name=Finanztracker
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

server.port=${PORT:8080}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/mydatabase}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:myuser}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:secret}}
spring.datasource.driver-class-name=org.postgresql.Driver

# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
spring.thymeleaf.cache=${SPRING_THYMELEAF_CACHE:true}
app.mail.from=${APP_MAIL_FROM:no-reply@finanztracker.local}
app.mail.required=${APP_MAIL_REQUIRED:true}
app.public-base-url=${APP_PUBLIC_BASE_URL:}

# SMTP-Konfiguration fuer Verifikationsmails
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties[mail.smtp.auth]=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties[mail.smtp.starttls.enable]=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties[mail.smtp.connectiontimeout]=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
spring.mail.properties[mail.smtp.timeout]=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:3000}
spring.mail.properties[mail.smtp.writetimeout]=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:5000}

spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}

