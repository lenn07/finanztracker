<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abonnement bearbeiten | Finanztracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="site-header">
    <div class="header-brand">
        <p class="eyebrow">Finanztracker</p>
        <h1>Abonnement bearbeiten</h1>
    </div>
    <div class="header-actions">
        <nav class="main-nav">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/transactions}">Transaktionen</a>
            <a th:href="@{/subscriptions}" class="active">Abonnements</a>
            <a th:href="@{/categories}">Kategorien</a>
            <a th:href="@{/budgets}">Budgets</a>
        </nav>
        <details class="account-menu" th:if="${userLoggedIn}">
            <summary class="account-trigger">
                <span class="account-trigger-label">Konto</span>
                <span class="account-trigger-icon" aria-hidden="true">v</span>
            </summary>
            <div class="account-panel">
                <p class="account-email" th:text="${currentUserEmail}">user@example.com</p>
                <form method="post" th:action="@{/auth/logout}">
                    <button class="button-link secondary logout-button" type="submit">Abmelden</button>
                </form>
            </div>
        </details>
    </div>
</header>

<main class="page single-column">
    <section class="card narrow">
        <form method="post" th:action="@{/subscriptions/{id}(id=${subscriptionId})}" th:object="${subscriptionForm}" class="stack-form">
            <label for="title">Titel</label>
            <input id="title" type="text" th:field="*{title}">
            <p class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>

            <label for="amount">Betrag</label>
            <input id="amount" type="number" step="0.01" min="0.01" th:field="*{amount}">
            <p class="field-error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></p>

            <label for="type">Typ</label>
            <select id="type" th:field="*{type}">
                <option th:each="transactionType : ${transactionTypes}" th:value="${transactionType}" th:text="${transactionType}"></option>
            </select>
            <p class="field-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></p>

            <label for="categoryId">Kategorie</label>
            <select id="categoryId" th:field="*{categoryId}">
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
            <p class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></p>

            <label for="interval">Intervall</label>
            <select id="interval" th:field="*{interval}">
                <option th:each="interval : ${subscriptionIntervals}" th:value="${interval}" th:text="${interval.label}"></option>
            </select>
            <p class="field-error" th:if="${#fields.hasErrors('interval')}" th:errors="*{interval}"></p>

            <label for="startDate">Startdatum</label>
            <input id="startDate" type="date" th:field="*{startDate}">
            <p class="field-error" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></p>

            <label for="endDate">Enddatum</label>
            <input id="endDate" type="date" th:field="*{endDate}">
            <p class="field-error" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></p>
            <p class="field-error" th:if="${#fields.hasErrors('dateRangeValid')}" th:errors="*{dateRangeValid}"></p>

            <label for="note">Notiz</label>
            <textarea id="note" rows="4" th:field="*{note}"></textarea>

            <label class="checkbox-row" for="active">
                <input id="active" type="checkbox" th:field="*{active}">
                <span>Automatische Buchung aktiv</span>
            </label>

            <div class="actions-row">
                <button type="submit">Aktualisieren</button>
                <a class="button-link secondary" th:href="@{/subscriptions}">Zurueck</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
