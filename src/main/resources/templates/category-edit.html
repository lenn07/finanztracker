<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorie bearbeiten | Finanztracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>
<header class="site-header">
    <div class="header-brand">
        <p class="eyebrow">Finanztracker</p>
        <h1>Kategorie bearbeiten</h1>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Menü öffnen" aria-expanded="false">
        <span></span><span></span><span></span>
    </button>
    <div class="header-actions" id="headerActions">
        <nav class="main-nav">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/transactions}">Transaktionen</a>
            <a th:href="@{/subscriptions}">Abonnements</a>
            <a th:href="@{/categories}" class="active">Kategorien</a>
            <a th:href="@{/budgets}">Budgets</a>
            <a th:href="@{/analyse}">Analyse</a>
            <a th:href="@{/settings}">Einstellungen</a>
        </nav>
    </div>
</header>

<main class="page single-column">
    <section class="card narrow">
        <form method="post" th:action="@{/categories/{id}(id=${categoryId})}" th:object="${categoryForm}" class="stack-form">
            <label for="name">Name</label>
            <input id="name" type="text" th:field="*{name}">
            <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            <div class="actions-row">
                <button type="submit">Aktualisieren</button>
                <a class="button-link secondary" th:href="@{/categories}">Zurueck</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
