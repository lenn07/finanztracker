<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorie-Budget bearbeiten | Finanztracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>
<header class="site-header">
    <div class="header-brand">
        <p class="eyebrow">Finanztracker</p>
        <h1>Kategorie-Budget bearbeiten</h1>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Menü öffnen" aria-expanded="false">
        <span></span><span></span><span></span>
    </button>
    <div class="header-actions" id="headerActions">
        <nav class="main-nav">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/transactions}">Transaktionen</a>
            <a th:href="@{/subscriptions}">Abonnements</a>
            <a th:href="@{/categories}">Kategorien</a>
            <a th:href="@{/budgets}" class="active">Budgets</a>
            <a th:href="@{/analyse}">Analyse</a>
            <a th:href="@{/settings}">Einstellungen</a>
        </nav>
    </div>
</header>

<main class="page single-column">
    <section class="card narrow">
        <form method="post" th:action="@{/budgets/category/{id}(id=${categoryBudgetId})}" th:object="${categoryBudgetForm}" class="stack-form">
            <label for="categoryId">Kategorie</label>
            <select id="categoryId" th:field="*{categoryId}">
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
            <p class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></p>

            <label for="monthlyLimit">Monatslimit</label>
            <input id="monthlyLimit" type="number" step="0.01" min="0.01" th:field="*{monthlyLimit}">
            <p class="field-error" th:if="${#fields.hasErrors('monthlyLimit')}" th:errors="*{monthlyLimit}"></p>

            <div class="actions-row">
                <button type="submit">Aktualisieren</button>
                <a class="button-link secondary" th:href="@{/budgets}">Zurueck</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
